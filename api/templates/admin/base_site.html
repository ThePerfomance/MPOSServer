{% extends "admin/base_site.html" %}
{% load i18n static jazzmin %}

{% block extrahead %}
{{ block.super }}
<style>
    /* 1. МАКСИМАЛЬНО ЖЕСТКОЕ СКРЫТИЕ ПОИСКА JAZZMIN */
    /* Скрываем саму форму, контейнер поиска и обертку в навигации */
    .navbar-search,
    #navbar-search,
    .form-inline,
    [action*="search"] {
        display: none !important;
        visibility: hidden !important;
        width: 0 !important;
        overflow: hidden !important;
    }

    /* 2. Скрываем пустой раздел Authentication */
    .app-auth { display: none !important; }

    /* 3. Очистка для преподавателя: скрываем сайдбар и лишние отступы */
    {% if user.role == 'teacher' %}
        aside.main-sidebar { display: none !important; }
        .content-wrapper, .main-header, .main-footer { margin-left: 0 !important; }
    {% endif %}

    /* Стили для кнопки "На главную" и имени пользователя */
    .btn-to-home {
        background: #f1f5f9;
        color: #475569 !important;
        border: 1px solid #e2e8f0;
        padding: 5px 14px !important;
        border-radius: 6px;
        font-weight: 500;
        font-size: 13px;
        margin-left: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .user-display-name {
        font-size: 14px;
        color: #64748b;
        margin-left: 8px;
        font-weight: 500;
    }
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Принудительное удаление элементов поиска через JS, если CSS не справился
    const searchSelectors = ['.navbar-search', '#navbar-search', '.form-inline'];
    searchSelectors.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) el.remove();
    });
    // === ДОБАВЛЕНИЕ ИКОНКИ «ГЛАЗ» ДЛЯ ВСЕХ ПОЛЕЙ ПАРОЛЕЙ ===
    const passwordInputs = document.querySelectorAll('input[type="password"]');

    passwordInputs.forEach(function(input) {
        // Создаем обертку, чтобы иконка позиционировалась ровно внутри поля
        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';

        // Подстраиваем обертку под стили текущего инпута
        if (window.getComputedStyle(input).display === 'block' || input.classList.contains('vTextField')) {
            wrapper.style.display = 'block';
            wrapper.style.width = '100%';
            input.style.width = '100%';
        } else {
            wrapper.style.display = 'inline-block';
        }

        // Перемещаем инпут внутрь обертки
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);

        // Добавляем отступ тексту, чтобы он не залезал под иконку
        input.style.paddingRight = '40px';

        // Создаем саму иконку
        const eyeIcon = document.createElement('i');
        eyeIcon.className = 'fas fa-eye';
        eyeIcon.style.position = 'absolute';
        eyeIcon.style.right = '12px';
        eyeIcon.style.top = '50%';
        eyeIcon.style.transform = 'translateY(-50%)';
        eyeIcon.style.cursor = 'pointer';
        eyeIcon.style.color = '#94a3b8'; // Серый цвет по умолчанию
        eyeIcon.style.zIndex = '10';
        eyeIcon.style.fontSize = '14px';
        eyeIcon.title = 'Показать пароль';

        // Логика переключения (показать/скрыть)
        eyeIcon.addEventListener('click', function() {
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.className = 'fas fa-eye-slash'; // Зачеркнутый глаз
                eyeIcon.style.color = '#2563eb'; // Подсвечиваем синим активное состояние
                eyeIcon.title = 'Скрыть пароль';
            } else {
                input.type = 'password';
                eyeIcon.className = 'fas fa-eye'; // Обычный глаз
                eyeIcon.style.color = '#94a3b8';
                eyeIcon.title = 'Показать пароль';
            }
        });

        // Добавляем иконку в обертку
        wrapper.appendChild(eyeIcon);
    });
// === ГЛОБАЛЬНОЕ МЕНЮ ПРЕПОДАВАТЕЛЯ ===
    const leftNav = document.querySelector('.main-header .navbar-nav:not(.ml-auto)');
    if (leftNav) {
        leftNav.innerHTML = `
            <li class="nav-item"><a href="{% url 'admin:index' %}" class="nav-link" style="color: #2563eb; font-weight: 600;"><i class="fas fa-rocket"></i> Дашборд</a></li>
            <li class="nav-item"><a href="{% url 'admin:api_subject_changelist' %}" class="nav-link"><i class="fas fa-book"></i> Предметы</a></li>
            <li class="nav-item"><a href="{% url 'admin:api_group_changelist' %}" class="nav-link"><i class="fas fa-users"></i> Мои группы</a></li>
            <li class="nav-item"><a href="{% url 'admin:api_testresult_changelist' %}" class="nav-link"><i class="fas fa-chart-pie"></i> Результаты</a></li>
        `;
    }
    const rightNav = document.querySelector('.main-header .navbar-nav.ml-auto');
    if (rightNav) {
        // Добавляем имя к существующей серой иконке
        const userMenuLink = rightNav.querySelector('.user-menu a.nav-link');
        if (userMenuLink && !document.querySelector('.user-display-name')) {
            const nameSpan = document.createElement('span');
            nameSpan.className = 'user-display-name';
            nameSpan.innerText = "{{ user.firstname|default:user.email }}";
            userMenuLink.appendChild(nameSpan);
        }

        // Добавляем кнопку "На главную" в конец
        if (!document.querySelector('.btn-to-home')) {
            const homeLi = document.createElement('li');
            homeLi.className = 'nav-item d-flex align-items-center';
            homeLi.innerHTML = `
                <a href="{% url 'admin:index' %}" class="btn-to-home">
                    <i class="fas fa-home"></i> На главную
                </a>
            `;
            rightNav.appendChild(homeLi);
        }
    }
});
</script>
{% endblock %}

{% block branding %}
<a href="{% url 'admin:index' %}" class="brand-link">
    <span class="brand-text font-weight-bold">
        <i class="fas fa-graduation-cap" style="color:#667eea;"></i>
        {% trans 'Учебная платформа' %}
    </span>
</a>
{% endblock %}
