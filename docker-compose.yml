services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: edudb
      POSTGRES_USER: eduuser
      POSTGRES_PASSWORD: edupassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduuser -d edudb"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python manage.py makemigrations api &&
             python manage.py migrate &&
             python manage.py seed_db &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://eduuser:edupassword@db:5432/edudb
      DJANGO_SECRET_KEY: "django-insecure-dev-secret-key-change-in-prod"
      DEBUG: "True"

volumes:
  pgdata: